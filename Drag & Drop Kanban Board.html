<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f3f4f6;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

/* Board Layout */

.board{
display:flex;
gap:20px;
max-width:1000px;
margin:auto;
}

.column{
flex:1;
background:#ffffff;
padding:15px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
min-height:300px;
}

.column h3{
text-align:center;
margin-bottom:15px;
}

/* Tasks */

.task{
background:#2563eb;
color:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
cursor:grab;
}

.task:active{
cursor:grabbing;
}

</style>
</head>

<body>

<h1>Kanban Task Board</h1>

<div class="board">

<div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>To Do</h3>

<div class="task" draggable="true" ondragstart="drag(event)" id="task1">
Design Website
</div>

<div class="task" draggable="true" ondragstart="drag(event)" id="task2">
Write Documentation
</div>

</div>

<div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>In Progress</h3>
</div>

<div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>Completed</h3>
</div>

</div>

<script>

function allowDrop(event){
event.preventDefault();
}

function drag(event){
event.dataTransfer.setData("text", event.target.id);
}

function drop(event){

event.preventDefault();

const id=event.dataTransfer.getData("text");

const task=document.getElementById(id);

event.target.appendChild(task);

}

</script>

</body>
</html>
